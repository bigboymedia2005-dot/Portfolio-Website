<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Video Production | Portfolio</title>
    <meta name="description"
        content="Strategic video editing and premium production for visionary brands and creators.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header">
        <div class="logo">
            <a href="#home" data-link>Edited<span class="accent">ByMe</span></a>
        </div>
        <nav class="nav">
            <ul class="nav-list">
                <li><a href="#home" class="nav-item" data-link>Home</a></li>
                <li><a href="#portfolio" class="nav-item" data-link>Portfolio</a></li>
                <li><a href="#services" class="nav-item" data-link>Services</a></li>
                <li><a href="#about" class="nav-item" data-link>About</a></li>
                <li><a href="#contact" class="nav-item" data-link>Contact</a></li>
            </ul>
        </nav>
        <div class="mobile-menu-btn">
            <span></span><span></span><span></span>
        </div>
    </header>

    <main id="app">
        <!-- SPA view is injected here -->
    </main>

    <footer class="footer">
        <p>&copy; <span id="year"></span> EditedB. All rights reserved.</p>
    </footer>

    <!-- Templates for SPA views -->
    <template id="home-view">
        <section class="hero view-enter">
            <div class="hero-bg">
                <img src="assets/hero_bg.png" alt="Cinematic video editing timeline">
            </div>
            <div class="hero-content">
                <h1 class="headline fade-in-up">Strategic Video<br>Editing Solutions</h1>
                <p class="hero-desc fade-in-up delay-1">Partnering with brands to deliver high-retention, cinematic visual content that drives engagement and results.</p>
                <div class="hero-actions fade-in-up delay-2">
                    <a href="#portfolio" class="btn btn-primary" data-link>See Capabilities</a>
                    <a href="#contact" class="btn btn-secondary" data-link>Start a Project</a>
                </div>
            </div>
        </section>

        <!-- Trust Stats Section -->
        <section class="trust-stats view-enter fade-in-up delay-2">
            <div class="container">
                <div class="stats-grid">
                    <div class="stat-item">
                        <h3 class="stat-number">5+</h3>
                        <p class="stat-label">Years Experience</p>
                    </div>
                    <div class="stat-item">
                        <h3 class="stat-number">150+</h3>
                        <p class="stat-label">Projects Delivered</p>
                    </div>
                    <div class="stat-item">
                        <h3 class="stat-number">50M+</h3>
                        <p class="stat-label">Views Generated</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Showreel Section -->
        <section class="showreel view-enter fade-in-up">
            <div class="container">
                <div class="video-container card">
                    <img src="assets/showreel_thumb.png" alt="Showreel Thumbnail" class="video-thumbnail">
                    <button class="play-btn" aria-label="Play Showreel">
                        <div class="play-icon"></div>
                    </button>
                    <div class="video-overlay"></div>
                </div>
            </div>
        </section>

        <!-- Portfolio Preview Section -->
        <section class="portfolio-preview view-enter fade-in-up">
            <div class="container">
                <div class="section-header flex-between">
                    <h2 class="section-title left-align" style="margin-bottom:0;">Featured Work</h2>
                    <a href="#portfolio" class="btn btn-secondary" data-link>View All Work</a>
                </div>
                <div class="grid portfolio-grid" style="margin-top: 3rem;">
                    <div class="portfolio-item card">
                        <div class="thumbnail">
                            <img src="assets/thumb_1.png" alt="Car commercial edit">
                            <div class="hover-overlay">
                                <span>Watch Video</span>
                            </div>
                        </div>
                        <h3>Neon Rush - Commercial</h3>
                        <p>High-energy editing designed to convert.</p>
                    </div>
                    <div class="portfolio-item card">
                        <div class="thumbnail">
                            <img src="assets/thumb_2.png" alt="Music video edit">
                            <div class="hover-overlay">
                                <span>Watch Video</span>
                            </div>
                        </div>
                        <h3>Echoes - Music Video</h3>
                        <p>Immersive visual storytelling.</p>
                    </div>
                </div>
            </div>
        </section>
    </template>

    <template id="portfolio-view">
        <section class="portfolio view-enter">
            <div class="container">
                <h2 class="section-title">Selected Works</h2>
                <div class="grid portfolio-grid">
                    <div class="portfolio-item card">
                        <div class="thumbnail">
                            <img src="assets/thumb_1.png" alt="Car commercial edit">
                            <div class="hover-overlay">
                                <span>Watch Video</span>
                            </div>
                        </div>
                        <h3>Neon Rush - Car Commercial</h3>
                        <p>Cinematic editing and color grading.</p>
                    </div>
                    <div class="portfolio-item card">
                        <div class="thumbnail">
                            <img src="assets/thumb_2.png" alt="Music video edit">
                            <div class="hover-overlay">
                                <span>Watch Video</span>
                            </div>
                        </div>
                        <h3>Echoes - Music Video</h3>
                        <p>Fast-paced cuts and dynamic transitions.</p>
                    </div>
                    <div class="portfolio-item card">
                        <div class="thumbnail">
                            <img src="assets/hero_bg.png" alt="Documentary edit">
                            <div class="hover-overlay">
                                <span>Watch Video</span>
                            </div>
                        </div>
                        <h3>The Journey - Documentary</h3>
                        <p>Narrative pacing and sound design.</p>
                    </div>
                </div>
            </div>
        </section>
    </template>

    <template id="services-view">
        <section class="services view-enter">
            <div class="container">
                <h2 class="section-title">What I Do</h2>
                <div class="grid services-grid">
                    <div class="service-card card fade-in-up">
                        <div class="icon">🎬</div>
                        <h3>Cinematic Edits</h3>
                        <p>High-end editing for short films, cinematic trailers, and documentary style content focusing
                            on emotional storytelling.</p>
                    </div>
                    <div class="service-card card fade-in-up delay-1">
                        <div class="icon">🏎️</div>
                        <h3>Commercials & Promos</h3>
                        <p>Fast-paced, high-retention ads designed to convert and drive engagement for brands.</p>
                    </div>
                    <div class="service-card card fade-in-up delay-2">
                        <div class="icon">📱</div>
                        <h3>Social Media / Shorts</h3>
                        <p>Optimized vertical cuts for TikTok, Reels, and YouTube Shorts with dynamic captions and
                            hooks.</p>
                    </div>
                    <div class="service-card card fade-in-up delay-3">
                        <div class="icon">📺</div>
                        <h3>YouTube Videos</h3>
                        <p>Engaging long-form content editing for creators focusing on retention flow and sound design.
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </template>

    <template id="about-view">
        <section class="about view-enter">
            <div class="container">
                <div class="about-grid">
                    <div class="about-image card fade-in-right">
                        <img src="assets/about_portrait.png" alt="Video Editor Portrait">
                    </div>
                    <div class="about-text fade-in-left">
                        <h2 class="section-title left-align">Hi, I'm Alex.</h2>
                        <p>I specialize in crafting high-impact video content for modern brands. My approach focuses on retention, aesthetic mastery, and delivering measurable value to your audience.</p>
                        <p>Combining seamless transitions, advanced color science, and immersive sound design, I partner with forward-thinking clients to elevate their digital presence.</p>
                        <div class="skills">
                            <span class="skill-tag">Adobe Premiere Pro</span>
                            <span class="skill-tag">DaVinci Resolve</span>
                            <span class="skill-tag">After Effects</span>
                            <span class="skill-tag">Color Grading</span>
                            <span class="skill-tag">Sound Design</span>
                        </div>
                        <a href="#contact" class="btn btn-primary" style="margin-top:2rem;" data-link>Let's Work
                            Together</a>
                    </div>
                </div>
            </div>
        </section>
    </template>

    <template id="contact-view">
        <section class="contact view-enter">
            <div class="container">
                <h2 class="section-title">Get In Touch</h2>
                <div class="contact-grid">
                    <div class="contact-info card fade-in-right">
                        <h3>Let's start your project</h3>
                        <p>Reach out if you have raw footage waiting to be transformed, or an idea that needs a creative
                            touch.</p>
                        <div class="contact-methods">
                            <a href="mailto:hello@editedbyme.xyz" class="contact-link">📧 hello@editedbyme.xyz</a>
                            <a href="https://wa.me/1234567890" class="contact-link" target="_blank" rel="noopener">💬
                                WhatsApp Me</a>
                        </div>
                    </div>
                    <div class="contact-form card fade-in-left delay-1">
                        <form onsubmit="event.preventDefault(); alert('Message sent successfully!');">
                            <div class="form-group">
                                <label for="name">Name</label>
                                <input type="text" id="name" required placeholder="John Doe">
                            </div>
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" required placeholder="john@example.com">
                            </div>
                            <div class="form-group">
                                <label for="message">Message</label>
                                <textarea id="message" rows="5" required
                                    placeholder="Tell me about your project..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-full">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </template>

    <script src="js/script.js"></script>
</body>

</html>
