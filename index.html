                    <a href="#project/2" class="portfolio-item-link" data-link>

                    <div class="service-card card fade-in-up delay-2" data-service-id="social">
                        <div class="icon">📱</div>
                        <h3>Social Media / Shorts</h3>

                    </div>
                    <div class="service-card card fade-in-up delay-3" data-service-id="youtube">
                        <div class="icon">📺</div>

                            <span class="skill-tag">After Effects</span>
                            <span class="skill-tag">Color Grading</span>
                            <span class="skill-tag">Sound Design</span>

                        <p>Reach out if you have raw footage waiting to be transformed, or an idea that needs a creative
                            touch.</p>
                        <div class="contact-methods">
                            <a href="mailto:kawidumadusanka20059@gmail.com" class="contact-link">📧
                                hello@kawidumadusanka.com</a>
                            <a href="https://wa.me/94788489361" class="contact-link" target="_blank" rel="noopener">💬
                                WhatsApp: 0788489361</a>
                        </div>
                    </div>
                    <div class="contact-form card fade-in-left delay-1">
                        <form action="https://formspree.io/f/xlgoqvlz" method="POST">
                            <div class="form-group">
                                <label for="name">Name</label>
                                <input type="text" id="name" name="name" required placeholder="John Doe">
                            </div>
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" name="email" required placeholder="john@example.com">
                            </div>
                            <div class="form-group">
                                <label for="message">Message</label>
                                <textarea id="message" name="message" rows="5" required
                                    placeholder="Tell me about your project..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-full">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
